<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="./styles.css" />
    <title>Selection Feature Page</title>
  </head>

  <body>
    <h1>Feature Selection</h1>

    <div class="feature-card-container">
      <label class="feature-card" for="dark-mode">
        <p>
          <span>Dark Mode</span>
          Switch to a darker color scheme
        </p>
        <input type="checkbox" id="dark-mode" />
      </label>

      <label class="feature-card" for="email-notifications">
        <p>
          <span>Email Notifications</span>
          Receive updates
        </p>
        <input type="checkbox" id="email-notifications" />
      </label>

      <label class="feature-card" for="cloud-backup">
        <p>
          <span>Cloud Backups</span>
          Automatically save your data
        </p>
        <input type="checkbox" id="cloud-backup" />
      </label>

      <label class="feature-card" for="auto-save">
        <p>
          <span>Auto Save</span>
          Save your progress automatically
        </p>
        <input type="checkbox" id="auto-save" />
      </label>
    </div>
  </body>
</html>
