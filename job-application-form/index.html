<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./styles.css" />
    <title>Job Application Form</title>
  </head>
  <body>
    <div class="container">
      <form>
        <label for="name">Full Name:</label>
        <input type="text" name="name" id="name" required />

        <label for="email">Email:</label>
        <input
          type="email"
          name="eamil"
          id="email"
          placeholder="kdapk@email.com"
          required
        />

        <label for="position">Position:</label>
        <select name="position" id="position">
          <option value="choose">Choose a position</option>
          <option value="manager">Manager</option>
          <option value="ceo">Chief Executive Office</option>
          <option value="deputy">Deputy Manager</option>
          <option value="secretary">Secretary</option>
        </select>

        <fieldset class="radio-group">
          <legend id="availabity">Availability</legend>
          <input type="radio" name="availability" id="f-time" checked />
          <label for="f-time">Full-Time</label>

          <input type="radio" name="availability" id="p-time" />
          <label for="p-time">Part-Time</label>

          <input type="radio" name="availability" id="remote" />
          <label for="remote">Remote</label>
        </fieldset>

        <label for="message">Why do you want this job?</label>
        <textarea name="message" id="message" rows="10"></textarea>
        <button type="submit">Submit Form</button>
      </form>
    </div>
  </body>
</html>
