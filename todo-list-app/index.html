<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="./css/styles.css" />
    <title>Styled To-Do List</title>
  </head>

  <body>
    <main class="main">
      <h1>My Todo List</h1>
      <ul class="todo-list">
        <li>
          <input type="checkbox" id="submit" />
          <label for="submit">Team presentation</label>
          <ul class="sub-item">
            <li>
              <a class="sub-item-link" href="https://google.com" target="_blank"
                >Call link</a
              >
            </li>
          </ul>
        </li>

        <li>
          <input type="checkbox" id="football" />
          <label for="football">Watch Man United vs Chelsea</label>
          <ul class="sub-item">
            <li>
              <a
                class="sub-item-link"
                href="https://www.youtube.com/manutd"
                target="_blank"
                >MU Tv</a
              >
            </li>
          </ul>
        </li>

        <li>
          <input type="checkbox" id="website" />
          <label for="website">Design homepage for website</label>
          <ul class="sub-item">
            <li>
              <a
                class="sub-item-link"
                href="https://www.freecodecamp.org/"
                target="_blank"
                >FreeCodeCamp</a
              >
            </li>
          </ul>
        </li>

        <li>
          <input type="checkbox" id="calculus" />
          <label for="calculus">Study 2 hours for calculus</label>
          <ul class="sub-item">
            <li>
              <a
                class="sub-item-link"
                href="https://www.khanacademy.org/math/differential-calculus"
                target="_blank"
                >Khan Academy</a
              >
            </li>
          </ul>
        </li>
      </ul>
    </main>
  </body>
</html>
